name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-pr:
    name: Validate PR Requirements
    if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Check PR Requirements
        uses: actions/github-script@v8
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const body = pr.body || '';
            const title = pr.title || '';

            console.log('Validating PR:', title);

            const issues = [];
            const warnings = [];

            // Check 1: Issue link or description requirement
            const hasIssueLink = /(?:Fixes|Closes|Resolves|Related to)\s+(?:honua-io\/\w+#\d+|#\d+)/i.test(body);
            const hasDescription = body.length > 50;
            if (!hasIssueLink && !hasDescription) {
              issues.push('❌ **Missing context** - Please include either "Fixes #123" or a detailed description');
            }

            // Check 2: Title format for admin UI
            const titleFormat = /^(feat|fix|docs|style|refactor|test|chore|ci|perf|ui)(\([^)]+\))?: .+/i;
            if (!titleFormat.test(title)) {
              issues.push('❌ **PR title format** - Should be "type: description" (e.g., "ui: add user dashboard component")');
            }

            // Check 3: Breaking changes for UI components
            const hasBreakingSection = body.includes('## Breaking Changes') || body.includes('BREAKING CHANGE');
            const likelyBreaking = title.toLowerCase().includes('breaking') ||
                                  body.toLowerCase().includes('breaking change') ||
                                  body.toLowerCase().includes('api change');
            if (likelyBreaking && !hasBreakingSection) {
              warnings.push('⚠️ **Potential breaking change** - Consider adding Breaking Changes section');
            }

            // Check 4: Component documentation
            const hasComponentDocs = body.includes('## Component Changes') ||
                                    body.includes('## UI Changes') ||
                                    body.includes('## Components');
            if (title.toLowerCase().includes('component') || title.toLowerCase().includes('ui')) {
              if (!hasComponentDocs) {
                warnings.push('⚠️ **UI/Component changes** - Consider documenting component changes');
              }
            }

            // Check 5: Screenshots for UI changes
            const hasScreenshots = body.includes('![') || body.includes('screenshot') || body.includes('image');
            if ((title.toLowerCase().includes('ui') ||
                 title.toLowerCase().includes('component') ||
                 title.toLowerCase().includes('style')) && !hasScreenshots) {
              warnings.push('⚠️ **UI changes without screenshots** - Consider adding before/after screenshots');
            }

            // Generate comment
            let comment = '## 🎨 Admin UI PR Validation\n\n';

            if (issues.length === 0 && warnings.length === 0) {
              comment += '✅ **All checks passed!** Your PR follows the requirements.\n\n';
              comment += '**Next steps for Admin UI PRs:**\n';
              comment += '- Ensure all tests pass\n';
              comment += '- Verify Blazor WebAssembly publish succeeds\n';
              comment += '- Test UI changes in multiple browsers if applicable\n';
              comment += '- Request review from team members\n';
            } else {
              if (issues.length > 0) {
                comment += '### ❌ Issues (must fix)\n\n';
                issues.forEach(issue => comment += `${issue}\n\n`);
              }

              if (warnings.length > 0) {
                comment += '### ⚠️ Recommendations\n\n';
                warnings.forEach(warning => comment += `${warning}\n\n`);
              }

              comment += '### 📚 Admin UI Guidelines\n';
              comment += '- Use semantic commit types: `ui:` for interface changes, `feat:` for new features\n';
              comment += '- Include screenshots for visual changes\n';
              comment += '- Document breaking changes to components\n';
              comment += '- Test Blazor WebAssembly compatibility\n\n';
            }

            comment += '\n---\n*Automated validation for Honua Server Admin UI*';

            // Update or create comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existingComment = comments.find(comment =>
              comment.body.includes('🎨 Admin UI PR Validation')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

            // Fail if critical issues found
            if (issues.length > 0) {
              core.setFailed(`PR validation failed: ${issues.length} critical issues found`);
            }

  # Require CI to pass before merge
  require-ci:
    name: Require CI Success
    runs-on: ubuntu-latest
    needs: validate-pr
    if: github.event_name == 'pull_request'
    timeout-minutes: 90
    permissions:
      checks: read
    steps:
      - name: Wait for CI gate
        uses: actions/github-script@v8
        with:
          script: |
            const checkName = 'CI Gate';
            const headSha = context.payload.pull_request.head.sha;
            const attempts = 360;
            const intervalMs = 15000;

            for (let attempt = 1; attempt <= attempts; attempt++) {
              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha,
                per_page: 100
              });

              const ciCheck = checks.check_runs.find(check => check.name === checkName);
              if (!ciCheck) {
                core.info(`Waiting for ${checkName} to be created for ${headSha} (${attempt}/${attempts})`);
              } else if (ciCheck.status !== 'completed') {
                core.info(`${checkName} is ${ciCheck.status}; waiting (${attempt}/${attempts})`);
              } else if (ciCheck.conclusion === 'success') {
                core.info(`${checkName} passed`);
                return;
              } else {
                core.setFailed(`${checkName} concluded ${ciCheck.conclusion}: ${ciCheck.html_url}`);
                return;
              }

              await new Promise(resolve => setTimeout(resolve, intervalMs));
            }

            core.setFailed(`Timed out waiting for ${checkName} on ${headSha}`);
