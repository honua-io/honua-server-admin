name: CI

on:
  push:
    branches: [main, trunk]
  pull_request:
    branches: [main, trunk]

permissions: {}

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build & Format Check
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      build-succeeded: ${{ steps.build.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Honua.Admin.sln

      - name: Build (warnings as errors)
        id: build
        run: dotnet build Honua.Admin.sln --no-restore --configuration Release /p:TreatWarningsAsErrors=true

      - name: Format Check
        run: dotnet format Honua.Admin.sln --verify-no-changes --verbosity diagnostic

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Honua.Admin.sln

      - name: Create Test Results Directory
        run: mkdir -p ./TestResults

      - name: Build test binaries
        run: dotnet build Honua.Admin.sln --no-restore --configuration Release

      - name: Run Unit Tests
        run: |
          dotnet test Honua.Admin.sln \
            --no-build \
            --no-restore \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=minimal" \
            --results-directory ./TestResults \
            --collect:"XPlat Code Coverage" \
            -- RunConfiguration.MaxCpuCount=1

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: TestResults/
          retention-days: 7

  publish-check:
    name: Publish Verification
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Honua.Admin.sln

      - name: Publish Blazor WebAssembly
        run: |
          dotnet publish src/Honua.Admin/Honua.Admin.csproj \
            --configuration Release \
            --output ./dist \
            --no-restore

      - name: Verify Published Output
        run: |
          if [ ! -f "./dist/wwwroot/index.html" ]; then
            echo "❌ Missing index.html in published output"
            exit 1
          fi
          if [ ! -f "./dist/wwwroot/_framework/blazor.webassembly.js" ]; then
            echo "❌ Missing Blazor WebAssembly runtime"
            exit 1
          fi
          echo "✅ Blazor WebAssembly publish verification passed"

      - name: Check Bundle Size
        run: |
          DIST_SIZE=$(du -sh ./dist | cut -f1)
          echo "📦 Published bundle size: $DIST_SIZE"

          # Check for common size issues
          WASM_SIZE=$(find ./dist -name "*.wasm" -exec du -ch {} + | grep total | cut -f1)
          echo "📊 WebAssembly size: $WASM_SIZE"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore and Build for Analysis
        run: |
          dotnet restore Honua.Admin.sln
          dotnet build Honua.Admin.sln --no-restore --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  # Gate job that requires all checks to pass
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [build, test, publish-check, security]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ Build job failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ Test job failed"
            exit 1
          fi
          if [[ "${{ needs.publish-check.result }}" != "success" ]]; then
            echo "❌ Publish verification failed"
            exit 1
          fi
          if [[ "${{ needs.security.result }}" != "success" ]]; then
            echo "❌ Security scan failed"
            exit 1
          fi
          echo "✅ All CI checks passed!"