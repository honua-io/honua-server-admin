name: CI

on:
  workflow_dispatch:
  push:
    branches: [master, main, trunk]
  pull_request:
    branches: [master, main, trunk]

permissions: {}

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  ADMIN_PUBLISH_MAX_BYTES: 62914560
  ADMIN_FRAMEWORK_MAX_BYTES: 47185920
  ADMIN_WASM_MAX_BYTES: 25165824

jobs:
  build:
    name: Build & Format Check
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.user.login != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      build-succeeded: ${{ steps.build.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Honua.Admin.sln

      - name: Build (warnings as errors)
        id: build
        run: dotnet build Honua.Admin.sln --no-restore --configuration Release /p:TreatWarningsAsErrors=true

      - name: Format Check
        run: dotnet format Honua.Admin.sln --verify-no-changes --verbosity diagnostic

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Honua.Admin.sln

      - name: Create Test Results Directory
        run: mkdir -p ./TestResults

      - name: Build test binaries
        run: dotnet build Honua.Admin.sln --no-restore --configuration Release

      - name: Run Unit Tests
        run: |
          dotnet test Honua.Admin.sln \
            --no-build \
            --no-restore \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=minimal" \
            --results-directory ./TestResults \
            --collect:"XPlat Code Coverage" \
            -- RunConfiguration.MaxCpuCount=1

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: TestResults/
          retention-days: 7

  container-e2e:
    name: Container E2E Readiness
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    timeout-minutes: 10
    env:
      HONUA_ADMIN_CONTAINER_E2E: ${{ vars.HONUA_ADMIN_CONTAINER_E2E || 'false' }}
      HONUA_SERVER_IMAGE: ${{ vars.HONUA_SERVER_IMAGE || 'ghcr.io/honua-io/honua-server:latest' }}
      HONUA_POSTGIS_IMAGE: ${{ vars.HONUA_POSTGIS_IMAGE || 'postgis/postgis:18-3.6' }}
      HONUA_ADMIN_CONTAINER_API_KEY: ${{ secrets.HONUA_ADMIN_CONTAINER_API_KEY || 'test-admin-key' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Honua.Admin.sln

      - name: Verify Docker is available
        run: docker info

      - name: Report container E2E configuration
        run: |
          echo "HONUA_ADMIN_CONTAINER_E2E=${HONUA_ADMIN_CONTAINER_E2E}"
          echo "HONUA_SERVER_IMAGE=${HONUA_SERVER_IMAGE}"
          echo "HONUA_POSTGIS_IMAGE=${HONUA_POSTGIS_IMAGE}"

      - name: Run container E2E lane
        run: |
          dotnet test tests/Honua.Admin.IntegrationTests/Honua.Admin.IntegrationTests.csproj \
            --configuration Release \
            --no-restore \
            --filter "Category=ContainerE2E" \
            --logger "console;verbosity=minimal" \
            -- RunConfiguration.MaxCpuCount=1

  publish-check:
    name: Publish Verification
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Honua.Admin.sln

      - name: Publish Blazor WebAssembly
        run: |
          dotnet publish src/Honua.Admin/Honua.Admin.csproj \
            --configuration Release \
            --output ./dist \
            --no-restore

      - name: Verify Published Output
        run: |
          if [ ! -f "./dist/wwwroot/index.html" ]; then
            echo "❌ Missing index.html in published output"
            exit 1
          fi
          if ! find "./dist/wwwroot/_framework" -maxdepth 1 -name "blazor.webassembly*.js" -print -quit | grep -q .; then
            echo "❌ Missing Blazor WebAssembly runtime"
            exit 1
          fi
          echo "✅ Blazor WebAssembly publish verification passed"

      - name: Check Bundle Size
        run: |
          DIST_BYTES=$(du -sb ./dist | cut -f1)
          FRAMEWORK_BYTES=$(du -sb ./dist/wwwroot/_framework | cut -f1)
          WASM_BYTES=$(find ./dist/wwwroot/_framework -name "*.wasm" -printf "%s\n" | awk '{ total += $1 } END { print total + 0 }')

          echo "Published bundle bytes: ${DIST_BYTES} / ${ADMIN_PUBLISH_MAX_BYTES}"
          echo "Framework payload bytes: ${FRAMEWORK_BYTES} / ${ADMIN_FRAMEWORK_MAX_BYTES}"
          echo "WebAssembly bytes: ${WASM_BYTES} / ${ADMIN_WASM_MAX_BYTES}"

          if [ "${DIST_BYTES}" -gt "${ADMIN_PUBLISH_MAX_BYTES}" ]; then
            echo "Published output exceeds budget"
            exit 1
          fi
          if [ "${FRAMEWORK_BYTES}" -gt "${ADMIN_FRAMEWORK_MAX_BYTES}" ]; then
            echo "Framework payload exceeds budget"
            exit 1
          fi
          if [ "${WASM_BYTES}" -gt "${ADMIN_WASM_MAX_BYTES}" ]; then
            echo "WebAssembly payload exceeds budget"
            exit 1
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore and Build for Analysis
        run: |
          dotnet restore Honua.Admin.sln
          dotnet build Honua.Admin.sln --no-restore --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  # Gate job that requires all checks to pass
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [build, test, container-e2e, publish-check, security]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ Build job failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ Test job failed"
            exit 1
          fi
          if [[ "${{ needs.container-e2e.result }}" != "success" ]]; then
            echo "❌ Container E2E readiness failed"
            exit 1
          fi
          if [[ "${{ needs.publish-check.result }}" != "success" ]]; then
            echo "❌ Publish verification failed"
            exit 1
          fi
          if [[ "${{ needs.security.result }}" != "success" ]]; then
            echo "❌ Security scan failed"
            exit 1
          fi
          echo "✅ All CI checks passed!"
