<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Honua Server Admin</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div class="d-flex justify-center align-center" style="height: 100vh;">
            <div class="mud-progress-circular mud-progress-circular-indeterminate mud-primary-color" role="progressbar" style="height: 64px; width: 64px;">
                <div class="mud-progress-circular-circle">
                    <svg viewBox="22 22 44 44">
                        <circle class="mud-progress-circular-circle-svg" cx="44" cy="44" r="20.2" stroke-dasharray="126.92" stroke-dashoffset="126.92"></circle>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
</body>

</html>
